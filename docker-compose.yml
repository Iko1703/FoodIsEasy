services:
  db:
    image: postgres:16-alpine
    container_name: foodiseasy-db
    environment:
      POSTGRES_DB: foodiseasy
      POSTGRES_USER: food
      POSTGRES_PASSWORD: food
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U food -d foodiseasy"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: FoodIsEasy/Dockerfile
    container_name: foodiseasy-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/foodiseasy
      SPRING_DATASOURCE_USERNAME: food
      SPRING_DATASOURCE_PASSWORD: food
      JWT_SECRET: ${JWT_SECRET:-FoodIsEasyDockerSecretKeyAtLeast32Bytes!!}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: foodiseasy-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
