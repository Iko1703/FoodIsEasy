spring.application.name=FoodIsEasy

spring.datasource.url=jdbc:postgresql://localhost:5432/foodiseasy
spring.datasource.username=food
spring.datasource.password=food
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.sql.init.mode=never

server.port=8080

jwt.secret=${JWT_SECRET:FoodIsEasyLocalSecretKeyAtLeast32Bytes!!}
jwt.expiration-ms=86400000
